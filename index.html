<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sperin Services | Electrician West Midlands</title>

<style>

/* =========================
BASE
========================= */
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#0b1220;
  color:white;
}

/* =========================
VIDEO HERO
========================= */
.hero{
  position:relative;
  height:75vh;
  overflow:hidden;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.hero-content{
  position:relative;
  z-index:1;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
}

.hero h1{
  font-size:32px;
}

.hero p{
  color:rgba(255,255,255,0.8);
}

/* =========================
BUTTONS (REAL LOOK)
========================= */
.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 18px;
  margin:10px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
}

/* phone */
.call{
  background:#007aff;
  color:white;
}

/* whatsapp */
.whatsapp{
  background:#25d366;
  color:white;
}

/* =========================
SECTION
========================= */
.section{
  padding:40px 20px;
  text-align:center;
}

.section h2{
  margin-bottom:20px;
}

/* =========================
SERVICES
========================= */
.services{
  display:grid;
  gap:20px;
}

.service{
  background:#111827;
  border-radius:14px;
  overflow:hidden;
  text-decoration:none;
  color:white;
  transition:0.2s;
}

.service:hover{
  transform:translateY(-5px);
}

.service img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.service-content{
  padding:15px;
  text-align:left;
}

.price{
  color:#5cc8ff;
}

/* =========================
BEFORE / AFTER
========================= */
.gallery{
  display:grid;
  gap:12px;
}

.gallery img{
  width:100%;
  border-radius:10px;
}

/* =========================
FOOTER BAR
========================= */
.sticky{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:12px;
}

.sticky a{
  color:white;
  text-decoration:none;
}

/* desktop */
@media(min-width:768px){
  .services{grid-template-columns:repeat(3,1fr);}
  .gallery{grid-template-columns:repeat(3,1fr);}
}

</style>
</head>

<body>

<!-- HERO WITH VIDEO -->
<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.coverr.co/videos/coverr-electrician-working-5176/1080p.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1>Sperin Services</h1>
    <p>Electrician • West Midlands</p>

    <a class="btn call" href="tel:07817360156">📞 Call Now</a>
    <a class="btn whatsapp" href="https://wa.me/447817360156">💬 WhatsApp</a>
  </div>
</section>

<!-- SERVICES -->
<section class="section">
  <h2>Our Services</h2>

  <div class="services">

    <a href="consumer.html" class="service">
      <img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789">
      <div class="service-content">
        <h3>Consumer Units</h3>
        <p>Fuse board upgrades</p>
        <div class="price">FROM £450</div>
      </div>
    </a>

    <a href="rewires.html" class="service">
      <img src="https://images.unsplash.com/photo-1600566752355-35792bedcfea">
      <div class="service-content">
        <h3>Rewires</h3>
        <p>Full house rewiring</p>
        <div class="price">FROM £3000</div>
      </div>
    </a>

    <a href="ev.html" class="service">
      <img src="https://images.unsplash.com/photo-1617788138017-80ad40651399">
      <div class="service-content">
        <h3>EV Charging</h3>
        <p>Home installs</p>
        <div class="price">FROM £800</div>
      </div>
    </a>

  </div>
</section>

<!-- BEFORE / AFTER -->
<section class="section">
  <h2>Recent Work</h2>

  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
    <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
  </div>
</section>

<!-- STICKY BAR -->
<div class="sticky">
  <a href="tel:07817360156">📞 Call</a>
  <a href="https://wa.me/447817360156">💬 WhatsApp</a>
</div>

</body>
</html>
