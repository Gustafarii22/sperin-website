<title>Sperin Services | Electrician West Midlands</title>

<style>

/* BASE */
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#0b1220;
  color:white;
}

/* HERO VIDEO */
.hero{
  position:relative;
  height:75vh;
  overflow:hidden;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.hero-content{
  position:relative;
  z-index:1;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
}

/* CONTACT BUTTONS */
.contact-bar{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.contact-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 16px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
  color:white;
}

.call{background:#007aff;}
.whatsapp{background:#25d366;}
.email{background:#ff9500;}

/* SERVICES GRID */
.services{
  display:grid;
  gap:20px;
  padding:20px;
}

.service{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  text-decoration:none;
  color:white;
}

.service img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}

/* OUTER GLOW ONLY */
.service::before{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:18px;
  z-index:-1;
  filter:blur(12px);
  opacity:0.7;
  transition:0.2s;
}

/* colours */
.service:nth-child(1)::before{background:#00aaff;}
.service:nth-child(2)::before{background:#a855f7;}
.service:nth-child(3)::before{background:#00ffaa;}
.service:nth-child(4)::before{background:#ff8800;}
.service:nth-child(5)::before{background:#00e0ff;}
.service:nth-child(6)::before{background:#ffd700;}

/* HOVER + CLICK */
.service:hover::before{
  opacity:1;
}

.service:active::before{
  filter:blur(18px);
  opacity:1;
}

.service-content{
  position:absolute;
  bottom:0;
  background:rgba(0,0,0,0.6);
  width:100%;
  padding:10px;
}

/* BEFORE AFTER */
.section{
  padding:30px 20px;
}

.gallery{
  display:grid;
  gap:10px;
}

.gallery img{
  width:100%;
  border-radius:10px;
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  gap:10px;
}

input, textarea{
  padding:10px;
  border-radius:6px;
  border:none;
}

button{
  padding:12px;
  background:#00aaff;
  color:white;
  border:none;
  border-radius:6px;
}

/* MOBILE GRID */
@media(min-width:768px){
  .services{grid-template-columns:repeat(3,1fr);}
  .gallery{grid-template-columns:repeat(3,1fr);}
}

</style>
</head>
