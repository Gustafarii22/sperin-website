<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sperin Services | Electrician West Midlands</title>

<style>

/* =========================
BASE
========================= */
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#0b1220;
  color:white;
}

/* =========================
HERO (LIKE ASGARD)
========================= */
.hero{
  height:70vh;
  background:url("https://images.unsplash.com/photo-1503387762-592deb58ef4e") center/cover no-repeat;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.hero-content{
  position:relative;
  z-index:1;
}

.hero h1{
  font-size:32px;
  margin-bottom:10px;
}

.hero p{
  color:rgba(255,255,255,0.8);
}

/* =========================
BUTTONS
========================= */
.btn{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
}

.btn-primary{
  background:#00aaff;
  color:white;
}

.btn-outline{
  border:1px solid #00aaff;
  color:#00aaff;
}

/* =========================
SECTION
========================= */
.section{
  padding:40px 20px;
  text-align:center;
}

.section h2{
  margin-bottom:20px;
}

/* =========================
SERVICES GRID
========================= */
.services{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.service{
  background:#111827;
  border-radius:14px;
  overflow:hidden;
  text-decoration:none;
  color:white;

  border:1px solid rgba(255,255,255,0.05);

  transition:0.2s;
}

/* subtle glow border only */
.service{
  box-shadow:0 0 0 1px rgba(0,170,255,0.2);
}

.service:hover{
  transform:translateY(-5px);
  box-shadow:
    0 0 15px rgba(0,170,255,0.4),
    0 10px 25px rgba(0,0,0,0.6);
}

.service img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.service-content{
  padding:15px;
  text-align:left;
}

.service h3{
  margin:0 0 5px;
}

.price{
  color:#5cc8ff;
  font-weight:600;
}

/* =========================
FOOTER BAR
========================= */
.sticky{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  background:#000;
  padding:12px;
}

.sticky a{
  color:white;
  text-decoration:none;
}

@media(min-width:768px){
  .services{
    grid-template-columns:repeat(3,1fr);
  }
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Sperin Services</h1>
    <p>Electrician in the West Midlands</p>

    <a class="btn btn-primary" href="tel:07817360156">Call Now</a>
    <a class="btn btn-outline" href="https://wa.me/447817360156">WhatsApp</a>
  </div>
</section>

<!-- SERVICES -->
<section class="section">
  <h2>Our Services</h2>

  <div class="services">

    <a href="consumer.html" class="service">
      <img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789">
      <div class="service-content">
        <h3>Consumer Units</h3>
        <p>Fuse board upgrades</p>
        <div class="price">FROM £450</div>
      </div>
    </a>

    <a href="rewires.html" class="service">
      <img src="https://images.unsplash.com/photo-1600566752355-35792bedcfea">
      <div class="service-content">
        <h3>Rewires</h3>
        <p>Full house rewiring</p>
        <div class="price">FROM £3000</div>
      </div>
    </a>

    <a href="ev.html" class="service">
      <img src="https://images.unsplash.com/photo-1617788138017-80ad40651399">
      <div class="service-content">
        <h3>EV Charging</h3>
        <p>Home charger installs</p>
        <div class="price">FROM £800</div>
      </div>
    </a>

  </div>
</section>

<!-- STICKY -->
<div class="sticky">
  <a href="tel:07817360156">📞 Call</a>
  <a href="https://wa.me/447817360156">💬 WhatsApp</a>
</div>

</body>
</html>
