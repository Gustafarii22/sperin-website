<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sperin Services | Electrician West Midlands</title>

<meta name="description" content="Electrician in the West Midlands. Consumer units, rewires, EV chargers, kitchens, bathrooms and EICR.">

<style>
body{margin:0;font-family:Arial;background:#020617;color:white}
header{text-align:center;padding:20px;background:#000}
.logo{font-size:22px;color:#5cc8ff}
.hero{text-align:center;padding:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:14px}

/* BUTTON TILE */
.card{
  border-radius:20px;
  overflow:hidden;
  text-decoration:none;
  color:white;
  position:relative;
  background:#111;
  transition:0.2s;
}

/* glow */
.card::before{
  content:"";
  position:absolute;
  inset:-3px;
  filter:blur(20px);
  opacity:0.7;
}

/* colours */
.card:nth-child(1)::before{background:#00aaff;}
.card:nth-child(2)::before{background:#a855f7;}
.card:nth-child(3)::before{background:#00ffaa;}
.card:nth-child(4)::before{background:#ff8800;}
.card:nth-child(5)::before{background:#00e0ff;}
.card:nth-child(6)::before{background:#ffd700;}

.card:hover{transform:scale(1.03)}
.card:active{transform:scale(0.97)}

.card img{width:100%;height:120px;object-fit:cover}
.card-content{padding:10px}
.price{font-size:12px;color:#5cc8ff}

</style>
</head>

<body>

<header>
<div class="logo">Sperin Services</div>
</header>

<section class="hero">
<h2>Electrical Services</h2>
<p>West Midlands</p>
</section>

<section class="grid">

<a href="consumer.html" class="card">
<img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789">
<div class="card-content">
<h3>Consumer Units</h3>
<p class="price">FROM £450</p>
</div>
</a>

<a href="rewires.html" class="card">
<img src="https://images.unsplash.com/photo-1600566752355-35792bedcfea">
<div class="card-content">
<h3>Rewires</h3>
<p class="price">FROM £3000</p>
</div>
</a>

<a href="ev.html" class="card">
<img src="https://images.unsplash.com/photo-1617788138017-80ad40651399">
<div class="card-content">
<h3>EV Charging</h3>
<p class="price">FROM £800</p>
</div>
</a>

<a href="kitchens.html" class="card">
<img src="https://images.unsplash.com/photo-1556912172-45b7abe8b7e1">
<div class="card-content">
<h3>Kitchens</h3>
<p class="price">FROM £5000</p>
</div>
</a>

<a href="bathrooms.html" class="card">
<img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a">
<div class="card-content">
<h3>Bathrooms</h3>
<p class="price">FROM £3500</p>
</div>
</a>

<a href="eicr.html" class="card">
<img src="https://images.unsplash.com/photo-1581090700227-4c4d8d45b6b2">
<div class="card-content">
<h3>EICR</h3>
<p class="price">FROM £120</p>
</div>
</a>

</section>

</body>
</html>
