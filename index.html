<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sperin Services | Electrician West Midlands</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#020617;
  color:white;
  scroll-behavior:smooth;
}

/* ===== HEADER ===== */
.header{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.logo{
  font-family:'Orbitron';
  font-weight:900;
  color:#1e90ff;
  font-size:22px;
}

.nav a{
  margin-left:20px;
  text-decoration:none;
  color:white;
  font-size:13px;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.7), #020617);
}

.hero-content{
  position:relative;
  z-index:1;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  padding:20px;
}

.hero h1{
  font-family:'Orbitron';
  font-size:42px;
  color:#1e90ff;
}

.hero p{
  color:#ccc;
}

/* ===== BUTTONS ===== */
.btn{
  display:inline-block;
  margin:10px;
  padding:14px 22px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  position:relative;
  font-weight:600;
  backdrop-filter:blur(8px);
}

.btn::before{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:12px;
  z-index:-1;
  filter:blur(12px);
  opacity:0.7;
}

.call{background:#1e90ff}
.call::before{background:#1e90ff}

.whatsapp{background:#25d366}
.whatsapp::before{background:#25d366}

.email{background:#ff9500}
.email::before{background:#ff9500}

.btn:hover{
  transform:translateY(-2px);
}

.btn:active::before{
  filter:blur(20px);
}

/* ===== SERVICES ===== */
.section{
  padding:100px 20px;
  text-align:center;
}

.services{
  display:grid;
  gap:25px;
  margin-top:40px;
}

.service{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  text-decoration:none;
  color:white;
  transform:translateY(40px);
  opacity:0;
  transition:0.6s ease;
}

.service.show{
  transform:translateY(0);
  opacity:1;
}

.service img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* CLEAN GLOW EDGE */
.service::before{
  content:"";
  position:absolute;
  inset:-4px;
  border-radius:20px;
  z-index:-1;
  background:#1e90ff;
  filter:blur(14px);
  opacity:0.5;
}

.service:hover::before{
  opacity:0.9;
}

.service:active::before{
  filter:blur(22px);
}

/* CONTENT */
.service-content{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  text-align:left;
  font-weight:600;
}

/* ===== GALLERY ===== */
.gallery{
  display:grid;
  gap:15px;
}

.gallery img{
  width:100%;
  border-radius:12px;
}

/* ===== QUOTE ===== */
.quote-box{
  max-width:500px;
  margin:auto;
}

.quote-box input,
.quote-box textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

.quote-box button{
  width:100%;
  padding:14px;
  background:#1e90ff;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:700;
}

/* ===== RESPONSIVE ===== */
@media(min-width:768px){
  .services{grid-template-columns:repeat(4,1fr);}
  .gallery{grid-template-columns:repeat(3,1fr);}
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

    <a href="#services">Services</a>
    <a href="#quote">Quote</a>

</div>

<!-- HERO -->
<section class="hero">

<video autoplay muted loop playsinline>

<p>West Midlands • Trusted • Professional</p>

<a href="ev.html" class="service"><img src="https://images.unsplash.com/photo-1617788138017-80ad40651399"><div class="service-content">EV Chargers</div></a>
<a href="eicr.html" class="service"><img src="https://images.unsplash.com/photo-1581090700227-4c4d8d45b6b2"><div class="service-content">EICR</div></a>
<a href="kitchens.html" class="service"><img src="https://images.unsplash.com/photo-1556912172-45b7abe8b7e1"><div class="service-content">Kitchens</div></a>

</div>

<!-- GALLERY -->
<section class="section">

<div class="gallery">

<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">

</div>

<section id="quote" class="section">

<div class="quote-box">
<form action="mailto:sperinservices@gmail.com">
<input type="text" placeholder="Name" required>
<input type="tel" placeholder="Phone" required>
<textarea placeholder="Job details"></textarea>
<button type="submit">Request Quote</button>
</form>

</section>

<script>

/* SCROLL ANIMATION */
const items = document.querySelectorAll('.service');

window.addEventListener('scroll', ()=>{
  items.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});

</script>

</body>
</html>
